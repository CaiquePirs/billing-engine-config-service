server:
  port: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/${PAYMENT_DB}
    username: ${PAYMENT_USER}
    password: ${PAYMENT_PASSWORD}
    driver-class-name: org.postgresql.Driver

  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      sqs:
        endpoint: ${AWS_URI}

    config:
      discovery:
        enabled: true
        service-id: config-server

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${SECRET_KEY}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_ZONE_URL}
  instance:
    instance-id: ${spring.application.name}:${random.value}

stripe:
  api-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

resilience4j:
  retry:
    instances:
      stripe:
        max-attempts: 4
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        wait-duration: 1
        ignore-exceptions:
          - com.stripe.exception.StripeException
          - com.stripe.exception.CardException
          - com.stripe.exception.InvalidRequestException
          - com.stripe.exception.AuthenticationException
          - com.stripe.exception.PermissionException
          - com.billing.payment.exception.PaymentDeclinedException

  circuitbreaker:
    instances:
      stripe:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        retry-exceptions:
          - com.billing.payment.exception.StripeIntegrationException
