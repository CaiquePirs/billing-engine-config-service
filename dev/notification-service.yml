server:
  port: 0

aws:
  region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}

  s3:
    bucket: ${AWS_S3_BUCKET}

  sqs:
    queue:
      notify-subscription: ${NOTIFY_SUBSCRIPTION_QUEUE}
      notify-payment-approved: ${NOTIFY_PAYMENT_APPROVED}
      notify-payment-failed: ${NOTIFY_PAYMENT_FAILED}
      invoice-created: ${INVOICE_CREATED_QUEUE}

notification:
  sender-email: ${INTERNAL_SERVICE_EMAIL}

spring:
  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_ZONE_URL}
  instance:
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTLP_METRICS_EXPORT_URL}
        step: 10s
    logging:
      endpoint: ${OTLP_LOGGING_EXPORT_URL}
    tracing:
      endpoint: ${OTLP_TRACING_EXPORT_URL}
