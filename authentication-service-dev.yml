server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/${AUTHENTICATION_DB}
    username: ${AUTHENTICATION_USER}
    password: ${AUTHENTICATION_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect