server:
  port: 0

aws:
  localstack:
    region: ${AWS_REGION}
    endpoint: ${AWS_URI}
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}

  production:
    region: ${AWS_REGION_PRODUCTION}
    access-key: ${AWS_ACCESS_KEY_PRODUCTION}
    secret-key: ${AWS_SECRET_KEY_PRODUCTION}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/${INVOICE_DB}
    username: ${INVOICE_USER}
    password: ${INVOICE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${SECRET_KEY}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_ZONE_URL}
  instance:
    instance-id: ${spring.application.name}:${random.value}

  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server

aws:
  sqs:
    queue:
      generate-invoice: ${GENERATE_NEW_INVOICE_QUEUE}
      invoice-created: ${INVOICE_CREATED_QUEUE}
